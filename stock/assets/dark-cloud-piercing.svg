<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <style>
      text { font-family: "PingFang SC","Microsoft YaHei",sans-serif; }
    </style>
    <marker id="arrow-down" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#ef4444" stroke="none"/>
    </marker>
    <marker id="arrow-up" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,8 L4,0 L8,8" fill="#22c55e" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="#1e1e1e"/>

  <!-- Separator -->
  <line x1="250" y1="50" x2="250" y2="260" stroke="#444" stroke-dasharray="4,4" stroke-width="1.5"/>

  <!-- ============ LEFT: 乌云盖顶 ============ -->
  <text x="125" y="28" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">乌云盖顶</text>
  <text x="125" y="46" text-anchor="middle" fill="#888" font-size="11">Dark Cloud Cover</text>
  <text x="125" y="270" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="bold">▼ 顶部看跌反转</text>

  <!-- C1: Big yang -->
  <g>
    <line x1="110" y1="55" x2="110" y2="80" stroke="#22c55e" stroke-width="2"/>
    <line x1="110" y1="185" x2="110" y2="200" stroke="#22c55e" stroke-width="2"/>
    <rect x="102" y="80" width="16" height="105" fill="#22c55e" rx="1"/>
  </g>

  <!-- C2: Yin piercing into yang body -->
  <g>
    <line x1="170" y1="50" x2="170" y2="68" stroke="#ef4444" stroke-width="2"/>
    <line x1="170" y1="148" x2="170" y2="162" stroke="#ef4444" stroke-width="2"/>
    <rect x="162" y="68" width="16" height="80" fill="#ef4444" rx="1"/>
  </g>

  <!-- Midpoint reference line -->
  <line x1="60" y1="132" x2="200" y2="132" stroke="#888" stroke-dasharray="3,3" stroke-width="1" opacity="0.6"/>
  <text x="58" y="136" text-anchor="end" fill="#888" font-size="9" opacity="0.7">实体中点</text>

  <!-- Annotation: penetration zone bracket -->
  <line x1="186" y1="132" x2="186" y2="148" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="183" y1="132" x2="189" y2="132" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <line x1="183" y1="148" x2="189" y2="148" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>

  <!-- ============ RIGHT: 刺透形态 ============ -->
  <text x="375" y="28" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">刺透形态</text>
  <text x="375" y="46" text-anchor="middle" fill="#888" font-size="11">Piercing Line</text>
  <text x="375" y="270" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="bold">▲ 底部看涨反转</text>

  <!-- C1: Big yin -->
  <g>
    <line x1="335" y1="50" x2="335" y2="82" stroke="#ef4444" stroke-width="2"/>
    <line x1="335" y1="168" x2="335" y2="195" stroke="#ef4444" stroke-width="2"/>
    <rect x="327" y="82" width="16" height="86" fill="#ef4444" rx="1"/>
  </g>

  <!-- C2: Yang piercing into yin body -->
  <g>
    <line x1="390" y1="95" x2="390" y2="108" stroke="#22c55e" stroke-width="2"/>
    <line x1="390" y1="178" x2="390" y2="195" stroke="#22c55e" stroke-width="2"/>
    <rect x="382" y="108" width="16" height="70" fill="#22c55e" rx="1"/>
  </g>

  <!-- Midpoint reference line -->
  <line x1="300" y1="125" x2="440" y2="125" stroke="#888" stroke-dasharray="3,3" stroke-width="1" opacity="0.6"/>
  <text x="442" y="129" text-anchor="start" fill="#888" font-size="9" opacity="0.7">实体中点</text>

  <!-- Annotation bracket -->
  <line x1="316" y1="108" x2="316" y2="125" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <line x1="313" y1="108" x2="319" y2="108" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <line x1="313" y1="125" x2="319" y2="125" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
</svg>
