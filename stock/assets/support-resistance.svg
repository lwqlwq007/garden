<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
    .title { font-size: 20px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 16px; text-anchor: middle; }
    .label { font-size: 13px; }
    .line { stroke: #888; stroke-width: 1.5; fill: none; }
    .dashed { stroke: #888; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; }
  </style>

  <text x="400" y="32" class="title">支撑与阻力</text>

  <!-- ===== Price curve (wave pattern) ===== -->
  <path d="M 80,260 
           L 120,200 L 160,240 L 200,170 L 240,220 
           L 280,300 L 320,240 L 360,350 L 400,280
           L 440,200 L 480,260 L 520,190 L 560,150
           L 600,210 L 640,170 L 680,250 L 720,220"
        class="line" stroke="#fff" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- Price points -->
  <circle cx="120" cy="200" r="3" fill="#fff"/>
  <circle cx="200" cy="170" r="3" fill="#fff"/>
  <circle cx="280" cy="300" r="3" fill="#fff"/>
  <circle cx="360" cy="350" r="3" fill="#fff"/>
  <circle cx="440" cy="200" r="3" fill="#fff"/>
  <circle cx="520" cy="190" r="3" fill="#fff"/>
  <circle cx="560" cy="150" r="3" fill="#fff"/>
  <circle cx="640" cy="170" r="3" fill="#fff"/>

  <!-- ===== Resistance line (red, top) ===== -->
  <line x1="80" y1="175" x2="720" y2="175" class="line" stroke="#ef4444" stroke-width="2.5"/>
  <text x="75" y="179" class="subtitle" text-anchor="end" fill="#ef4444">阻力线</text>

  <!-- ===== Support line (green, bottom) ===== -->
  <line x1="80" y1="345" x2="720" y2="345" class="line" stroke="#22c55e" stroke-width="2.5"/>
  <text x="75" y="349" class="subtitle" text-anchor="end" fill="#22c55e">支撑线</text>

  <!-- ===== Breakout: Price breaks above resistance ===== -->
  <!-- Around x=560, price goes from 190 to 150, breaking above resistance at 175 -->
  <line x1="540" y1="175" x2="560" y2="175" class="line" stroke="#ef4444" stroke-width="2"/>
  <!-- Breakout arrow -->
  <line x1="550" y1="175" x2="550" y2="135" class="line" stroke="#22c55e" stroke-width="2"/>
  <polygon points="550,142 544,152 556,152" fill="#22c55e"/>
  <text x="565" y="140" class="subtitle" fill="#22c55e">突破</text>
  <!-- Annotation: resistance turns to support -->
  <line x1="640" y1="175" x2="640" y2="345" class="dashed" stroke="#ffaa00" stroke-width="1"/>
  <text x="660" y="240" class="label" fill="#ffaa00">突破后阻力</text>
  <text x="660" y="258" class="label" fill="#ffaa00">转化为支撑</text>

  <!-- ===== Breakdown: Price breaks below support ===== -->
  <!-- Around x=320-360, price goes from 240 to 350, breaking below support at 345 -->
  <line x1="320" y1="345" x2="360" y2="345" class="line" stroke="#22c55e" stroke-width="2"/>
  <!-- Breakdown arrow -->
  <line x1="340" y1="345" x2="340" y2="385" class="line" stroke="#ef4444" stroke-width="2"/>
  <polygon points="340,378 334,368 346,368" fill="#ef4444"/>
  <text x="355" y="395" class="subtitle" fill="#ef4444">跌破</text>
  <!-- Annotation: support turns to resistance -->
  <line x1="280" y1="345" x2="280" y2="175" class="dashed" stroke="#ffaa00" stroke-width="1"/>
  <text x="100" y="230" class="label" fill="#ffaa00">跌破后支撑</text>
  <text x="100" y="248" class="label" fill="#ffaa00">转化为阻力</text>

  <!-- Legend -->
  <rect x="560" y="390" width="150" height="80" fill="#2a2a2a" rx="4"/>
  <text x="635" y="410" class="label" text-anchor="middle" font-weight="bold">图例</text>
  <line x1="570" y1="425" x2="600" y2="425" stroke="#ef4444" stroke-width="2"/>
  <text x="605" y="429" class="label" fill="#ef4444">阻力</text>
  <line x1="570" y1="445" x2="600" y2="445" stroke="#22c55e" stroke-width="2"/>
  <text x="605" y="449" class="label" fill="#22c55e">支撑</text>
  <line x1="570" y1="462" x2="600" y2="462" stroke="#fff" stroke-width="2"/>
  <text x="605" y="466" class="label" fill="#fff">价格</text>
</svg>