<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <style>
      text { font-family: "PingFang SC","Microsoft YaHei",sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">红三兵</text>
  <text x="250" y="50" text-anchor="middle" fill="#888" font-size="12">Three Advancing Soldiers</text>

  <!-- Subtle upward trend line -->
  <line x1="90" y1="190" x2="410" y2="110" stroke="#22c55e" stroke-width="1" opacity="0.15" stroke-dasharray="6,4"/>

  <!-- C1: First candle (strongest, largest body) -->
  <g>
    <line x1="130" y1="100" x2="130" y2="112" stroke="#22c55e" stroke-width="2"/>
    <line x1="130" y1="195" x2="130" y2="210" stroke="#22c55e" stroke-width="2"/>
    <rect x="122" y="112" width="16" height="83" fill="#22c55e" rx="1"/>
  </g>

  <!-- C2: Second candle (medium body, smaller) -->
  <g>
    <line x1="250" y1="72" x2="250" y2="82" stroke="#22c55e" stroke-width="2"/>
    <line x1="250" y1="137" x2="250" y2="148" stroke="#22c55e" stroke-width="2"/>
    <rect x="242" y="82" width="16" height="55" fill="#22c55e" rx="1"/>
  </g>

  <!-- C3: Third candle (smallest body) -->
  <g>
    <line x1="370" y1="50" x2="370" y2="58" stroke="#22c55e" stroke-width="2"/>
    <line x1="370" y1="97" x2="370" y2="108" stroke="#22c55e" stroke-width="2"/>
    <rect x="362" y="58" width="16" height="39" fill="#22c55e" rx="1"/>
  </g>

  <!-- Body height annotations -->
  <line x1="146" y1="112" x2="155" y2="112" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="146" y1="195" x2="155" y2="195" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="155" y1="112" x2="155" y2="195" stroke="#fff" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>

  <line x1="266" y1="82" x2="275" y2="82" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="266" y1="137" x2="275" y2="137" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="82" x2="275" y2="137" stroke="#fff" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>

  <line x1="386" y1="58" x2="395" y2="58" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="386" y1="97" x2="395" y2="97" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <line x1="395" y1="58" x2="395" y2="97" stroke="#fff" stroke-width="1" opacity="0.3" stroke-dasharray="2,2"/>

  <!-- Size decreasing annotation -->
  <text x="160" y="163" fill="#888" font-size="9" opacity="0.6">实体渐短</text>
  <text x="280" y="117" fill="#888" font-size="9" opacity="0.6">⇓</text>

  <!-- Upward arrow -->
  <path d="M250,248 L250,265" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="245,265 250,273 255,265" fill="#22c55e"/>

  <!-- Label -->
  <text x="250" y="288" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">稳步推升</text>
</svg>
