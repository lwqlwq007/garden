<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
    .title { font-size: 20px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 16px; text-anchor: middle; }
    .label { font-size: 13px; }
    .line { stroke: #888; stroke-width: 1.5; fill: none; }
    .dashed { stroke: #888; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; }
  </style>

  <text x="400" y="32" class="title">MACD 底背离</text>

  <!-- ===== TOP PANEL: Price ===== -->
  <rect x="75" y="50" width="650" height="215" fill="none" stroke="#333" stroke-width="1" rx="4"/>
  <text x="400" y="70" class="subtitle">价格走势</text>

  <!-- Price curve (making lower lows) -->
  <path d="M 100,80 
           C 150,80 170,130 220,140
           C 260,145 280,160 320,170
           C 360,180 380,200 420,200
           C 460,200 480,220 520,220
           C 560,220 580,200 620,180
           C 660,160 680,140 700,120"
        class="line" stroke="#ef4444" stroke-width="2.5" fill="none"/>

  <!-- Price troughs -->
  <circle cx="220" cy="140" r="4" fill="#fff"/>
  <text x="220" y="130" class="label" text-anchor="middle">P1</text>

  <circle cx="420" cy="200" r="4" fill="#fff"/>
  <text x="420" y="210" class="label" text-anchor="middle">P2</text>

  <circle cx="620" cy="180" r="4" fill="#fff"/>
  <text x="620" y="170" class="label" text-anchor="middle">P3</text>

  <!-- Trend line connecting price troughs (downward) -->
  <line x1="220" y1="140" x2="420" y2="200" class="dashed" stroke="#ef4444"/>
  <line x1="420" y1="200" x2="620" y2="180" class="dashed" stroke="#ef4444"/>
  <text x="420" y="230" class="label" text-anchor="middle" fill="#ef4444">价格创新低 ↓</text>

  <!-- Vertical dashed lines from price troughs down -->
  <line x1="220" y1="200" x2="220" y2="310" class="dashed" stroke="#444"/>
  <line x1="420" y1="225" x2="420" y2="310" class="dashed" stroke="#444"/>
  <line x1="620" y1="200" x2="620" y2="310" class="dashed" stroke="#444"/>

  <!-- ===== BOTTOM PANEL: MACD ===== -->
  <rect x="75" y="280" width="650" height="185" fill="none" stroke="#333" stroke-width="1" rx="4"/>
  <text x="400" y="300" class="subtitle">MACD 指标</text>

  <!-- Zero line -->
  <line x1="100" y1="380" x2="700" y2="380" class="dashed" stroke="#555"/>
  <text x="705" y="384" class="label" fill="#555">0</text>

  <!-- MACD line (making higher lows - bullish divergence!) -->
  <path d="M 100,440 
           C 150,440 170,410 220,400
           C 260,395 280,390 320,370
           C 360,355 380,350 420,360
           C 460,370 480,370 520,350
           C 560,330 580,340 620,355
           C 660,370 680,380 700,390"
        class="line" stroke="#22c55e" stroke-width="2.5" fill="none"/>

  <!-- MACD troughs -->
  <circle cx="220" cy="400" r="4" fill="#22c55e"/>
  <text x="220" y="390" class="label" text-anchor="middle" fill="#22c55e">M1</text>

  <circle cx="420" cy="360" r="4" fill="#22c55e"/>
  <text x="420" y="350" class="label" text-anchor="middle" fill="#22c55e">M2</text>

  <circle cx="620" cy="355" r="4" fill="#22c55e"/>
  <text x="620" y="345" class="label" text-anchor="middle" fill="#22c55e">M3</text>

  <!-- Trend line connecting MACD troughs (upward) -->
  <line x1="220" y1="400" x2="420" y2="360" class="dashed" stroke="#22c55e"/>
  <line x1="420" y1="360" x2="620" y2="355" class="dashed" stroke="#22c55e"/>
  <text x="420" y="430" class="label" text-anchor="middle" fill="#22c55e">MACD 未创新低 ↑</text>

  <!-- ===== Divergence annotation ===== -->
  <rect x="290" y="228" width="220" height="40" fill="#002a00" rx="6" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="244" class="subtitle" text-anchor="middle" fill="#22c55e">✅ 底背离</text>
  <text x="400" y="260" class="label" text-anchor="middle" fill="#88ff88">价格新低但 MACD 未新低，上涨信号</text>

  <!-- Connector lines from annotation to both panels -->
  <line x1="320" y1="228" x2="320" y2="200" class="dashed" stroke="#22c55e" stroke-width="1"/>
  <line x1="320" y1="268" x2="320" y2="310" class="dashed" stroke="#22c55e" stroke-width="1"/>
</svg>
