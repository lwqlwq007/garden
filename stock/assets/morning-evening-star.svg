<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#1e1e1e"/>
  <style>
    text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
    .title { font-size: 20px; font-weight: bold; text-anchor: middle; }
    .subtitle { font-size: 16px; text-anchor: middle; }
    .label { font-size: 13px; text-anchor: middle; }
    .line { stroke: #888; stroke-width: 1.5; fill: none; }
  </style>

  <text x="400" y="32" class="title">晨星与黄昏星</text>

  <!-- ===== LEFT: Morning Star (晨星) ===== -->
  <text x="240" y="65" class="subtitle" fill="#22c55e">晨星（看涨反转）</text>

  <!-- Day 1: Long red candle -->
  <line x1="140" y1="165" x2="140" y2="185" class="line" stroke="#ef4444"/>
  <rect x="125" y="185" width="30" height="145" fill="#ef4444"/>
  <line x1="140" y1="330" x2="140" y2="350" class="line" stroke="#ef4444"/>
  <text x="140" y="380" class="label">1</text>

  <!-- Day 2: Doji (gap down) -->
  <line x1="240" y1="335" x2="240" y2="355" class="line" stroke="#888"/>
  <rect x="225" y="355" width="30" height="4" fill="#888"/>
  <line x1="240" y1="359" x2="240" y2="378" class="line" stroke="#888"/>
  <text x="240" y="380" class="label">2</text>
  <!-- Gap indicator -->
  <text x="240" y="342" class="label" fill="#888" font-size="11">缺口↓</text>

  <!-- Day 3: Long green candle (gap up) -->
  <line x1="340" y1="140" x2="340" y2="160" class="line" stroke="#22c55e"/>
  <rect x="325" y="160" width="30" height="175" fill="#22c55e"/>
  <line x1="340" y1="335" x2="340" y2="355" class="line" stroke="#22c55e"/>
  <text x="340" y="380" class="label">3</text>
  <!-- Gap indicator -->
  <text x="340" y="342" class="label" fill="#888" font-size="11">缺口↑</text>

  <!-- ===== RIGHT: Evening Star (黄昏星) ===== -->
  <text x="560" y="65" class="subtitle" fill="#ef4444">黄昏星（看跌反转）</text>

  <!-- Day 1: Long green candle -->
  <line x1="460" y1="140" x2="460" y2="160" class="line" stroke="#22c55e"/>
  <rect x="445" y="160" width="30" height="175" fill="#22c55e"/>
  <line x1="460" y1="335" x2="460" y2="355" class="line" stroke="#22c55e"/>
  <text x="460" y="380" class="label">1</text>

  <!-- Day 2: Doji (gap up) -->
  <line x1="560" y1="135" x2="560" y2="148" class="line" stroke="#888"/>
  <rect x="545" y="148" width="30" height="4" fill="#888"/>
  <line x1="560" y1="152" x2="560" y2="165" class="line" stroke="#888"/>
  <text x="560" y="380" class="label">2</text>
  <!-- Gap indicator -->
  <text x="560" y="140" class="label" fill="#888" font-size="11">缺口↑</text>

  <!-- Day 3: Long red candle (gap down) -->
  <line x1="660" y1="155" x2="660" y2="175" class="line" stroke="#ef4444"/>
  <rect x="645" y="175" width="30" height="155" fill="#ef4444"/>
  <line x1="660" y1="330" x2="660" y2="350" class="line" stroke="#ef4444"/>
  <text x="660" y="380" class="label">3</text>
  <!-- Gap indicator -->
  <text x="660" y="168" class="label" fill="#888" font-size="11">缺口↓</text>

  <!-- Notes -->
  <text x="240" y="430" class="label" fill="#aaa">长阴 → 小十字 → 跳空大阳</text>
  <text x="560" y="430" class="label" fill="#aaa">长阳 → 小十字 → 跳空大阴</text>

  <!-- Divider -->
  <line x1="390" y1="70" x2="390" y2="470" class="line" stroke="#444" stroke-dasharray="2 4"/>
</svg>